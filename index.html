<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שרה | Home Made Bakery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fdf6ef;
            --warm1: #f9ede0;
            --warm2: #f2d9c0;
            --copper: #c8704a;
            --copper-dark: #a85535;
            --copper-light: #e8905a;
            --brown: #2d1a0e;
            --brown-mid: #7a5040;
            --brown-light: #9a7060;
            --blush: #f5c6a8;
            --rose: #e8956d;
            --mint: #a8d5b5;
            --green: #27ae60;
            --gold: #d4a24e;
            --gold-light: #f0c97a;
            --wa: #25d366;
            --wa-dark: #128c7e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Assistant', sans-serif; background: var(--cream); color: var(--brown); overflow-x: hidden; direction: rtl; }

        /* ─── NAV (FIXED) ─── */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 200;
            background: rgba(253, 246, 239, 0.97);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            height: 64px;
            border-bottom: 1px solid var(--warm2);
            box-shadow: 0 2px 20px rgba(200, 112, 74, 0.1);
        }

        .logo {
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--brown);
            flex-shrink: 0;
        }

        .logo span { color: var(--copper); }

        .nav-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-link {
            color: var(--brown-mid);
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            transition: all .2s;
        }

        .nav-link:hover { background: var(--warm1); color: var(--copper); }

        .nav-wa {
            background: linear-gradient(135deg, var(--wa), var(--wa-dark));
            color: #fff;
            padding: 8px 16px;
            border-radius: 22px;
            font-weight: 800;
            font-size: 13px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
            transition: transform .2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap; /* מונע חיתוך טקסט */
            flex-shrink: 0;
        }

        .nav-wa:hover { transform: scale(1.05); }

        /* ─── HERO ─── */
        .hero { min-height: 100vh; background: linear-gradient(160deg, #fff8f2 0%, #fde8d0 40%, #f5d4b5 70%, #edd4b0 100%); display: flex; align-items: center; justify-content: center; padding: 90px 5% 60px; text-align: center; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8704a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); pointer-events: none; }
        .hero-inner { position: relative; z-index: 2; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(48px, 9vw, 88px); font-weight: 900; line-height: 1.1; margin-bottom: 18px; color: var(--brown); }
        .hero h1 .accent { color: var(--copper); display: block; }
        .hero-desc { color: var(--brown-mid); font-size: 18px; line-height: 1.8; margin-bottom: 34px; max-width: 550px; margin-inline: auto; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, var(--copper), var(--copper-dark)); color: #fff; padding: 15px 34px; border-radius: 30px; font-weight: 800; font-size: 16px; border: none; cursor: pointer; box-shadow: 0 8px 24px rgba(200, 112, 74, 0.35); transition: all .3s; font-family: 'Assistant', sans-serif; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 14px 30px rgba(200, 112, 74, 0.45); }

        /* ─── TRUST BAR ─── */
        .trust { background: linear-gradient(135deg, var(--brown) 0%, #4a2510 100%); padding: 16px 5%; display: flex; justify-content: center; flex-wrap: wrap; }
        .trust-item { color: #fff; font-size: 13px; font-weight: 700; padding: 6px 20px; border-left: 1px solid rgba(255,255,255,0.15); }
        .trust-item:last-child { border-left: none; }

        /* ─── CATALOG ─── */
        .catalog { padding: 90px 5%; background: var(--cream); }
        .section-header { text-align: center; margin-bottom: 50px; }
        .section-header h2 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 48px); font-weight: 900; color: var(--brown); }
        .cat-tabs { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 44px; }
        .cat-tab { background: #fff; border: 2px solid var(--warm2); padding: 10px 22px; border-radius: 24px; font-size: 14px; font-weight: 800; cursor: pointer; transition: all .3s; }
        .cat-tab.active { background: var(--copper); color: #fff; border-color: transparent; }

        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; max-width: 1200px; margin: 0 auto; }
        .prod-card { background: #fff; border-radius: 22px; overflow: hidden; box-shadow: 0 4px 18px rgba(0,0,0,0.07); transition: all .3s; cursor: pointer; border: 2px solid transparent; }
        .prod-card:hover { transform: translateY(-8px); border-color: var(--blush); }
        .prod-img { height: 220px; background: var(--warm1); position: relative; }
        .prod-img img { width: 100%; height: 100%; object-fit: cover; }
        .prod-body { padding: 20px; }
        .prod-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--brown); margin-bottom: 8px; }
        .prod-btn { width: 100%; background: var(--copper); color: #fff; border: none; padding: 12px; border-radius: 12px; font-weight: 800; font-family: 'Assistant', sans-serif; cursor: pointer; }

        /* ─── MODAL ─── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; border-radius: 26px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; padding: 30px; }
        .modal-close { position: absolute; top: 15px; left: 15px; background: #eee; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
        .modal-input { width: 100%; border: 2px solid var(--warm2); border-radius: 12px; padding: 12px; margin-bottom: 15px; font-family: 'Assistant', sans-serif; outline: none; }
        .modal-submit { width: 100%; background: var(--wa); color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .nav-links { display: none; } /* במובייל מסתירים את הקישורים באמצע */
            .trust-item { font-size: 11px; padding: 5px 10px; }
        }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="#">שרה <span>❤</span></a>
    
    <div class="nav-links">
        <a href="#catalog" class="nav-link">קטלוג</a>
        <a href="#reviews" class="nav-link">ביקורות</a>
        <a href="#info" class="nav-link">מידע</a>
    </div>

    <a href="https://wa.me/972523394838" target="_blank" class="nav-wa">וואטסאפ 💬</a>
</nav>

<section class="hero">
    <div class="hero-inner">
        <h1>מתוקים<span class="accent">מהלב ❤</span></h1>
        <p class="hero-desc">מארזי מתוקים, עוגות מספרים ומגשים מרהיבים – עבודת יד עם המון אהבה וחומרי גלם איכותיים.</p>
        <button class="btn-primary" onclick="document.getElementById('catalog').scrollIntoView({behavior:'smooth'})">🛒 לקטלוג המלא</button>
    </div>
</section>

<div class="trust">
    <div class="trust-item">🏠 עבודת יד</div>
    <div class="trust-item">✨ איכות פרימיום</div>
    <div class="trust-item">🛵 משלוחים בחריש</div>
    <div class="trust-item">✡️ כשר למהדרין</div>
</div>

<section class="catalog" id="catalog">
    <div class="section-header">
        <h2>הקטלוג שלנו</h2>
    </div>
    <div class="cat-tabs">
        <div class="cat-tab active" onclick="filterCat('all',this)">הכל</div>
        <div class="cat-tab" onclick="filterCat('maarz',this)">מארזים</div>
        <div class="cat-tab" onclick="filterCat('mispar',this)">עוגות מספרים</div>
    </div>
    <div class="prod-grid" id="prodGrid">
        <div class="prod-card" data-cat="maarz" onclick="openModal('מארז לב מוס', 'מארז מוס מפנק עם כיתוב אישי')">
            <div class="prod-img"></div>
            <div class="prod-body">
                <div class="prod-name">מארז לב מוס</div>
                <button class="prod-btn">להזמנה</button>
            </div>
        </div>
    </div>
</section>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h3 id="mTitle" style="margin-bottom:10px"></h3>
        <p id="mDesc" style="margin-bottom:20px; color:#666"></p>
        <input type="text" class="modal-input" id="nameInput" placeholder="שם מלא">
        <input type="tel" class="modal-input" id="phoneInput" placeholder="טלפון">
        <textarea class="modal-input" id="noteInput" placeholder="בקשות מיוחדות או כיתוב על העוגה" style="height:100px"></textarea>
        <button class="modal-submit" onclick="sendOrder()">💬 שליחת הזמנה לוואטסאפ</button>
    </div>
</div>

<script>
    let selectedProduct = "";

    function filterCat(cat, el) {
        document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        // לוגיקת סינון פשוטה
    }

    function openModal(name, desc) {
        selectedProduct = name;
        document.getElementById('mTitle').innerText = name;
        document.getElementById('mDesc').innerText = desc;
        document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('open');
    }

    function sendOrder() {
        const name = document.getElementById('nameInput').value;
        const note = document.getElementById('noteInput').value;
        if(!name) return alert("אנא הזינו שם");
        
        const text = `היי שרה, אני רוצה להזמין: ${selectedProduct}\nשם: ${name}\nבקשות: ${note}`;
        window.open(`https://wa.me/972523394838?text=${encodeURIComponent(text)}`, '_blank');
    }
</script>

</body>
</html>
